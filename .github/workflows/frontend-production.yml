name: Frontend Production CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Type Check
        run: npm run typecheck
        continue-on-error: true # For now, allow failing if there are strict types

      - name: Lint Codebase
        run: npm run lint
        continue-on-error: true

      - name: Build Application
        run: npm run build

      # Future expansion: run vitest, cypress
      # - name: Run Unit Tests
      #   run: npm run test

      - name: Docker Build & Push (Placeholder)
        run: |
          echo "Building docker image..."
          docker build -t assethub-frontend:latest .
          # docker push your-registry/assethub-frontend:latest

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-dist
          path: ./frontend/dist/
